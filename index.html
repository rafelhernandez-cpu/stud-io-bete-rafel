<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrickBuilder 3D - Technic & Stacking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #0a0a0a; color: #e5e5e5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: #171717; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #404040; border-radius: 10px; }
        
        .color-dot {
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            transition: transform 0.2s; border: 2px solid transparent;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        .category-pill {
            padding: 4px 10px; border-radius: 20px; font-size: 9px;
            font-weight: 800; text-transform: uppercase;
            background: #262626; color: #a3a3a3; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .category-pill.active { background: #3b82f6; color: white; }

        #baseplateStatus {
            position: absolute; top: 20px; left: 340px;
            background: rgba(0,0,0,0.7); padding: 6px 12px;
            border-radius: 6px; border: 1px solid #444;
            font-size: 10px; font-weight: bold; color: #888;
            pointer-events: none; z-index: 50;
        }
        #baseplateStatus.active { color: #22c55e; border-color: #22c55e; }
    </style>
</head>
<body class="flex h-screen w-full">

    <div id="baseplateStatus">BASEPLATE: OFF (Prems 'M')</div>

    <aside class="w-80 bg-neutral-900 border-r border-neutral-800 flex flex-col z-20 shadow-2xl">
        <div class="p-5 border-b border-neutral-800 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2 text-white">
                <i class="fas fa-cube text-blue-500"></i> BrickBuilder
            </h1>
        </div>

        <div class="flex border-b border-neutral-800">
            <button onclick="switchTab('library')" id="btnLib" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 border-blue-500 text-white">Llibreria</button>
            <button onclick="switchTab('inventory')" id="btnInventory" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest border-b-2 border-transparent text-neutral-500">Inventari</button>
        </div>

        <div id="tabLibrary" class="flex flex-col flex-1 overflow-hidden">
            <div class="p-4 border-b border-neutral-800 bg-black/20">
                <div class="flex flex-wrap gap-2 mb-4 sidebar-scroll overflow-x-auto pb-2" id="categoryFilters">
                    <span class="category-pill active" data-cat="totes">Totes</span>
                    <span class="category-pill" data-cat="bricks">Bricks</span>
                    <span class="category-pill" data-cat="technic">Technic</span>
                    <span class="category-pill" data-cat="plates">Plates</span>
                    <span class="category-pill" data-cat="axles">Eixos/Rodes</span>
                </div>
                <p class="text-[10px] text-neutral-500 font-bold mb-2 uppercase tracking-tighter">Controls</p>
                <ul class="text-[10px] text-neutral-400 space-y-1">
                    <li><i class="fas fa-sync mr-1 text-yellow-400"></i> <span class="font-bold text-white">'R'</span> Rotar Y / <span class="font-bold text-white">'X'</span> Rotar X</li>
                    <li><i class="fas fa-arrows-alt mr-1 text-blue-400"></i> Arrossega l'eix cap al centre d'un forat</li>
                    <li><i class="fas fa-arrows-v mr-1 text-green-400"></i> Fletxes <span class="font-bold text-white">↑ ↓</span> per moure verticalment</li>
                </ul>

                    <i class="fas fa-trash-alt"></i>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",

            }

    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'brick-builder-pro';
        let user = null;

        const GRID_SIZE = 0.8;
        const BRICK_HEIGHT = 0.96;
        const PLATE_HEIGHT = 0.32;
        const COLORS = ['#ef4444', '#3b82f6', '#eab308', '#22c55e', '#f5f5f5', '#171717', '#9333ea', '#737373'];

        const BRICK_LIBRARY = [
            // Bricks 1xN
            { id: '3005', name: 'Brick 1 x 1', dim: [1, 1, 1], type: 'brick', cat: 'bricks', price: 0.05 },
            { id: '3004', name: 'Brick 1 x 2', dim: [1, 1, 2], type: 'brick', cat: 'bricks', price: 0.08 },
            { id: '3622', name: 'Brick 1 x 3', dim: [1, 1, 3], type: 'brick', cat: 'bricks', price: 0.10 },
            { id: '3010', name: 'Brick 1 x 4', dim: [1, 1, 4], type: 'brick', cat: 'bricks', price: 0.12 },
            { id: '3009', name: 'Brick 1 x 6', dim: [1, 1, 6], type: 'brick', cat: 'bricks', price: 0.18 },
            
            // Bricks 2xN
            { id: '3003', name: 'Brick 2 x 1', dim: [2, 1, 1], type: 'brick', cat: 'bricks', price: 0.08 },
            { id: '3003b', name: 'Brick 2 x 2', dim: [2, 1, 2], type: 'brick', cat: 'bricks', price: 0.12 },
            { id: '3002', name: 'Brick 2 x 3', dim: [2, 1, 3], type: 'brick', cat: 'bricks', price: 0.15 },
            { id: '3001', name: 'Brick 2 x 4', dim: [2, 1, 4], type: 'brick', cat: 'bricks', price: 0.20 },
            { id: '2456', name: 'Brick 2 x 6', dim: [2, 1, 6], type: 'brick', cat: 'bricks', price: 0.30 },

            // Technic Bricks (amb forats)
            { id: '6541', name: 'Technic 1x1 Hole', dim: [1, 1, 1], type: 'technic', cat: 'technic', price: 0.08 },
            { id: '3700', name: 'Technic 1x2 Holes', dim: [1, 1, 2], type: 'technic', cat: 'technic', price: 0.10 },
            { id: '3700b', name: 'Technic 1x3 Holes', dim: [1, 1, 3], type: 'technic', cat: 'technic', price: 0.12 },
            { id: '3701', name: 'Technic 1x4 Holes', dim: [1, 1, 4], type: 'technic', cat: 'technic', price: 0.15 },
            { id: '3894', name: 'Technic 1x6 Holes', dim: [1, 1, 6], type: 'technic', cat: 'technic', price: 0.22 },

            // Plates 1xN
            { id: '3024', name: 'Plate 1 x 1', dim: [1, 0.33, 1], type: 'plate', cat: 'plates', price: 0.03 },
            { id: '3023', name: 'Plate 1 x 2', dim: [1, 0.33, 2], type: 'plate', cat: 'plates', price: 0.04 },
            { id: '3623', name: 'Plate 1 x 3', dim: [1, 0.33, 3], type: 'plate', cat: 'plates', price: 0.05 },
            { id: '3710', name: 'Plate 1 x 4', dim: [1, 0.33, 4], type: 'plate', cat: 'plates', price: 0.06 },
            { id: 'plate15', name: 'Plate 1 x 5', dim: [1, 0.33, 5], type: 'plate', cat: 'plates', price: 0.08 },
            { id: '3666', name: 'Plate 1 x 6', dim: [1, 0.33, 6], type: 'plate', cat: 'plates', price: 0.09 },

            // Plates 2xN
            { id: '3022', name: 'Plate 2 x 2', dim: [2, 0.33, 2], type: 'plate', cat: 'plates', price: 0.06 },
            { id: '3021', name: 'Plate 2 x 3', dim: [2, 0.33, 3], type: 'plate', cat: 'plates', price: 0.08 },
            { id: '3020', name: 'Plate 2 x 4', dim: [2, 0.33, 4], type: 'plate', cat: 'plates', price: 0.10 },
            { id: 'plate25', name: 'Plate 2 x 5', dim: [2, 0.33, 5], type: 'plate', cat: 'plates', price: 0.12 },
            { id: '3795', name: 'Plate 2 x 6', dim: [2, 0.33, 6], type: 'plate', cat: 'plates', price: 0.15 },

            // Plate 4x4
            { id: '3031', name: 'Plate 4 x 4', dim: [4, 0.33, 4], type: 'plate', cat: 'plates', price: 0.25 },

            // Eixos i Rodes
            { id: '3705', name: 'Axle 3', dim: [1, 1, 3], type: 'axle', cat: 'axles', price: 0.07 },
            { id: '3706', name: 'Axle 4', dim: [1, 1, 4], type: 'axle', cat: 'axles', price: 0.09 },
            { id: 'wheel-t', name: 'Technic Wheel', dim: [2, 2, 1], type: 'wheel', cat: 'axles', price: 0.30 }
        ];

        let scene, camera, renderer, controls, raycaster, mouse;
        let placedBricks = [];
        let selectedBrick = null;
        let isDragging = false;
        let dragPlane = new THREE.Plane();
        let dragOffset = new THREE.Vector3();
        let intersection = new THREE.Vector3();
        let currentCategory = 'totes';
        let baseplate = null;

        async function init() {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();
            onAuthStateChanged(auth, (u) => { user = u; if(user) setupInventoryListener(); });

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 320, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvasContainer').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // Grid helper alineat amb els studs
            scene.add(new THREE.GridHelper(40, 50, 0x222222, 0x111111));
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            initLibrary();
            initColorPicker();
            initFilters();
            
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            window.addEventListener('keydown', onKeyDown);

            document.getElementById('saveBtn').onclick = saveProject;
            animate();
        }

        function createBrickGeometry(data) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.2, metalness: 0.1 });
            
            let h = (data.type === 'brick' || data.type === 'technic') ? BRICK_HEIGHT : PLATE_HEIGHT;
            let w = data.dim[0] * GRID_SIZE - 0.04;
            let d = data.dim[2] * GRID_SIZE - 0.04;

            if (data.type === 'axle') {
                const axleLen = data.dim[2] * GRID_SIZE;
                const crossSize = 0.24;
                const bar1 = new THREE.Mesh(new THREE.BoxGeometry(crossSize, 0.08, axleLen), mat);
                const bar2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, crossSize, axleLen), mat);
                group.add(bar1, bar2);
                h = crossSize;
            } 
            else if (data.type === 'wheel') {
                const wheelRadius = 0.75; 
                const wheelThickness = 0.6;
                const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelThickness, 32);
                const wheelMesh = new THREE.Mesh(wheelGeo, mat);
                wheelMesh.rotation.x = Math.PI / 2;
                group.add(wheelMesh);

                const holeVisGeo = new THREE.CylinderGeometry(0.22, 0.22, wheelThickness + 0.1, 16);
                const holeVis = new THREE.Mesh(holeVisGeo, new THREE.MeshStandardMaterial({color: 0x000000}));
                holeVis.rotation.x = Math.PI/2;
                group.add(holeVis);

                const holeMarker = new THREE.Object3D();
                holeMarker.name = "technicHole";
                holeMarker.userData.isHole = true;
                group.add(holeMarker);
                h = wheelRadius * 2;
            } 
            else {
                const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                body.castShadow = true; body.receiveShadow = true;
                group.add(body);
                
                if (data.type === 'technic') {
                    for(let i = 0; i < data.dim[2]; i++) {
                        const holeMarker = new THREE.Object3D();
                        holeMarker.position.set(0, 0, (i - (data.dim[2]-1)/2) * GRID_SIZE);
                        holeMarker.userData.isHole = true;
                        holeMarker.name = "technicHole";
                        group.add(holeMarker);

                        const holeVisGeo = new THREE.CylinderGeometry(0.2, 0.2, w + 0.2, 16);
                        const holeVis = new THREE.Mesh(holeVisGeo, new THREE.MeshStandardMaterial({color: 0x000000}));
                        holeVis.rotation.z = Math.PI/2;
                        holeVis.position.copy(holeMarker.position);
                        group.add(holeVis);
                    }
                }

                const studGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.12, 12);
                for(let x = 0; x < data.dim[0]; x++) {
                    for(let z = 0; z < data.dim[2]; z++) {
                        const stud = new THREE.Mesh(studGeo, mat);
                        stud.position.set((x - (data.dim[0]-1)/2) * GRID_SIZE, h/2 + 0.06, (z - (data.dim[2]-1)/2) * GRID_SIZE);
                        group.add(stud);
                    }
                }
            }
            
            group.userData = { ...data, actualH: h, instanceId: Math.random() };
            return group;
        }

        function snapToGrid(obj) {
            // STEP HORITZONTAL: Increment de GRID_SIZE (0.8) per forçar alineació amb studs
            const stepH = GRID_SIZE;
            
            // Per evitar que les peces quedin "entre mig" dels espais de la baseplate,
            // calculem el decalatge (offset) segons si la peça és de mida parell o imparell.
            let effDimX = obj.userData.dim[0];
            let effDimZ = obj.userData.dim[2];
            
            // Invertim l'ample i profunditat si la peça està rotada 90 o 270 graus
            const rotY = Math.abs(Math.round(obj.rotation.y / (Math.PI/2))) % 4;
            if (rotY === 1 || rotY === 3) {
                effDimX = obj.userData.dim[2];
                effDimZ = obj.userData.dim[0];
            }

            // Peces amb dimensió imparell (ex: 1x2, 1x1) requereixen un desplaçament de mig grid (0.4) 
            // perquè els seus studs coincideixin exactament amb els espais de la Baseplate i altres peces.
            const offsetX = (effDimX % 2 !== 0) ? (stepH / 2) : 0;
            const offsetZ = (effDimZ % 2 !== 0) ? (stepH / 2) : 0;

            // Arrodonim la posició aplicant l'offset calculat
            obj.position.x = Math.round((obj.position.x - offsetX) / stepH) * stepH + offsetX;
            obj.position.z = Math.round((obj.position.z - offsetZ) / stepH) * stepH + offsetZ;

            // Logica d'eixos (axles) - Snapping especial a forats
            if (obj.userData.type === 'axle') {
                let bestHolePos = null;
                let minDist = 0.8;

                placedBricks.forEach(other => {
                    if (other === obj) return;
                    other.updateMatrixWorld();
                    other.children.forEach(child => {
                        if (child.userData.isHole) {
                            const holeWorldPos = new THREE.Vector3();
                            child.getWorldPosition(holeWorldPos);
                            const d = obj.position.distanceTo(holeWorldPos);
                            if (d < minDist) {
                                minDist = d;
                                bestHolePos = holeWorldPos.clone();
                            }
                        }
                    });
                });

                if (bestHolePos) {
                    obj.position.copy(bestHolePos);
                    return; 
                }
            }

            // SNAP VERTICAL: Increment de PLATE_HEIGHT (0.32)
            const stepV = PLATE_HEIGHT;
            
            const downRay = new THREE.Raycaster(
                new THREE.Vector3(obj.position.x, obj.position.y + 5, obj.position.z), 
                new THREE.Vector3(0, -1, 0)
            );
            const others = placedBricks.filter(b => b !== obj);
            // Incloure la baseplate en la detecció si existeix
            if(baseplate) others.push(baseplate);

            const intersects = downRay.intersectObjects(others, true);

            let groundY = 0;
            if (intersects.length > 0) {
                let hitObj = intersects[0].object;
                // Trobar el pare de la peça
                while(hitObj.parent && !hitObj.userData.instanceId && hitObj !== baseplate) hitObj = hitObj.parent;
                
                if (hitObj === baseplate) {
                    groundY = 0; // La superfície de la baseplate està a Y=0
                } else {
                    groundY = hitObj.position.y + hitObj.userData.actualH/2;
                }
            }
            
            // Alineació vertical en "pisos" de plate (0.32)
            let newY = groundY + obj.userData.actualH/2;
            obj.position.y = Math.round(newY / stepV) * stepV;
        }

        function createBrick(data) {
            const brick = createBrickGeometry(data);
            brick.position.set(0, 2, 0); 
            scene.add(brick);
            placedBricks.push(brick);
            selectBrick(brick);
            snapToGrid(brick); 
            updateUI();
        }

        function selectBrick(obj) {
            if(selectedBrick) deselect();
            selectedBrick = obj;
            obj.traverse(c => { if(c.isMesh) { c.userData.oldEmissive = c.material.emissive?.clone(); if(c.material.emissive) c.material.emissive.set(0x333333); } });
            document.getElementById('selectionPanel').classList.remove('hidden');
            document.getElementById('selPreview').style.backgroundColor = obj.userData.color;
            document.getElementById('selName').innerText = obj.userData.name;
        }

        function deselect() {
            if(selectedBrick) selectedBrick.traverse(c => { if(c.isMesh && c.material.emissive) c.material.emissive.set(0x000000); });
            selectedBrick = null; document.getElementById('selectionPanel').classList.add('hidden');
        }

        function onMouseDown(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(placedBricks, true);
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.instanceId) obj = obj.parent;
                selectBrick(obj);
                isDragging = true; controls.enabled = false;
                dragPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0, 1, 0), obj.position);
                if(raycaster.ray.intersectPlane(dragPlane, intersection)) dragOffset.copy(intersection).sub(obj.position);
            } else deselect();
        }

        function onMouseMove(e) {
            if(!isDragging || !selectedBrick) return;
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if(raycaster.ray.intersectPlane(dragPlane, intersection)) {
                selectedBrick.position.x = intersection.x - dragOffset.x;
                selectedBrick.position.z = intersection.z - dragOffset.z;
                snapToGrid(selectedBrick);
            }
        }

        function onMouseUp() { isDragging = false; controls.enabled = true; }

        function onKeyDown(e) {
            if(!selectedBrick) {
                if(e.key.toLowerCase() === 'm') toggleBaseplate();
                return;
            }
            if(e.key.toLowerCase() === 'r') { selectedBrick.rotation.y += Math.PI/2; snapToGrid(selectedBrick); }
            if(e.key.toLowerCase() === 'x') { selectedBrick.rotation.x += Math.PI/2; snapToGrid(selectedBrick); }
            if(e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
            
            // Moviment vertical amb fletxes basat en l'alçada de plate (0.32)
            if(e.key === 'ArrowUp') { selectedBrick.position.y += PLATE_HEIGHT; snapToGrid(selectedBrick); }
            if(e.key === 'ArrowDown') { selectedBrick.position.y -= PLATE_HEIGHT; snapToGrid(selectedBrick); }
        }

        function toggleBaseplate() {
            if (baseplate) { scene.remove(baseplate); baseplate = null; document.getElementById('baseplateStatus').classList.remove('active'); }
            else {
                // Alçada 0.1, centrada en Y = -0.05 per a que la superfície superior sigui Y = 0
                const geo = new THREE.BoxGeometry(32 * GRID_SIZE, 0.1, 32 * GRID_SIZE);
                const mat = new THREE.MeshStandardMaterial({ color: 0x1b4332 });
                baseplate = new THREE.Mesh(geo, mat); 
                baseplate.position.y = -0.05; 
                scene.add(baseplate);
                document.getElementById('baseplateStatus').classList.add('active');
            }
        }

        function initLibrary() {
            const container = document.getElementById('brickLibrary');
            container.innerHTML = '';
            const filtered = currentCategory === 'totes' ? BRICK_LIBRARY : BRICK_LIBRARY.filter(b => b.cat === currentCategory);
            filtered.forEach(brick => {
                const btn = document.createElement('button');
                btn.className = 'flex flex-col items-center p-3 bg-neutral-800 rounded-xl hover:bg-neutral-700 border border-transparent hover:border-blue-500';
                btn.onclick = () => createBrick({...brick, color: COLORS[1]});
                btn.innerHTML = `<div class="w-full h-8 rounded mb-2 bg-blue-500/10 flex items-center justify-center text-blue-400"><i class="fas ${brick.type === 'axle' ? 'fa-arrows-alt-v' : (brick.type === 'wheel' ? 'fa-dharmachakra' : 'fa-cube')}"></i></div><span class="text-[9px] font-bold text-neutral-300 truncate w-full">${brick.name}</span>`;
                container.appendChild(btn);
            });
        }

        function initColorPicker() {
            const container = document.getElementById('colorPicker');
            container.innerHTML = '';
            COLORS.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-dot'; dot.style.backgroundColor = color;
                dot.onclick = () => {
                    if(selectedBrick) {
                        selectedBrick.userData.color = color;
                        selectedBrick.traverse(c => { if(c.isMesh && c.material.color) c.material.color.set(color); });
                        document.getElementById('selPreview').style.backgroundColor = color;
                    }
                }; 
                container.appendChild(dot);
            });
        }

        function initFilters() {
            document.querySelectorAll('.category-pill').forEach(pill => {
                pill.onclick = () => {
                    document.querySelector('.category-pill.active').classList.remove('active');
                    pill.classList.add('active'); currentCategory = pill.dataset.cat; initLibrary();
                };
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = (window.innerWidth - 320) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 320, window.innerHeight);
        }

        function updateUI() {
            const total = placedBricks.reduce((acc, b) => acc + (b.userData.price || 0), 0);
            document.getElementById('totalPrice').innerText = `${total.toFixed(2)} €`;
        }

        window.deleteSelected = () => {
            if(!selectedBrick) return;
            scene.remove(selectedBrick);
            placedBricks = placedBricks.filter(b => b !== selectedBrick);
            deselect(); updateUI();
        };

        window.switchTab = (tab) => {
            document.getElementById('tabLibrary').classList.toggle('hidden', tab !== 'library');
            document.getElementById('tabInventory').classList.toggle('hidden', tab !== 'inventory');
        };

        async function saveProject() { }
        function setupInventoryListener() { }

        init();
    </script>
</body>
</html>
